[package]
name = "mimir-app"
version = "0.4.10"
description = "Mimir desktop and mobile shell"
authors = ["Jean-Baptiste Thery"]
edition = "2021"
license = "MIT"

[lib]
name = "mimir_app_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tauri = { version = "2", features = [] }
