[package]
name = "ragmir-app"
version = "0.4.10"
description = "Ragmir desktop and mobile shell"
authors = ["Jean-Baptiste Thery"]
edition = "2021"
license = "MIT"

[lib]
name = "ragmir_app_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tauri = { version = "2", features = ["protocol-asset"] }
tauri-plugin-dialog = "2.7.1"
