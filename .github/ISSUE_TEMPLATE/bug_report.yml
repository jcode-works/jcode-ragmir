name: Bug report
description: Report a reproducible Mimir bug
title: "bug: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Provide commands and minimal sample files. Do not include private documents or secrets.
      render: bash
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Mimir version
      placeholder: "pnpm exec mimir --version"
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
