name: Release npm

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  actions: write
  contents: write
  issues: write
  id-token: write
  pull-requests: write

concurrency:
  group: release-npm-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Semantic release
    runs-on: ubuntu-latest
    environment:
      name: npm-publish
      url: https://www.npmjs.com/package/@jcode.labs/ragmir
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Verify main branch
        run: test "${GITHUB_REF}" = "refs/heads/main"

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Set up pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.9.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate release gate
        run: pnpm validate

      - name: Semantic release
        run: pnpm exec semantic-release
        env:
          GITHUB_TOKEN: ${{ github.token }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Upload release verification artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ragmir-release-${{ github.sha }}
          path: release-artifacts/

      - name: Resolve released version
        id: version
        run: |
          VERSION=$(git describe --tags --abbrev=0 2>/dev/null | sed 's/^v//' || echo "")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  deploy-landing:
    name: Rebuild and deploy landing with new version
    runs-on: ubuntu-latest
    needs: release
    if: needs.release.outputs.version != ''
    steps:
      - name: Trigger landing deploy with version
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'deploy-landing.yml',
              ref: 'main',
              inputs: { version: '${{ needs.release.outputs.version }}' }
            })
