name: Publish npm

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version already committed in package.json"
        required: true
        type: string

permissions:
  actions: read
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    environment:
      name: npm-publish
      url: https://www.npmjs.com/package/@jcode.labs/mimir
    steps:
      - name: Verify main branch
        run: test "${GITHUB_REF}" = "refs/heads/main"

      - name: Verify CI passed for this commit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          conclusion="$(gh run list --repo jcode-works/jcode-mimir --workflow ci.yml --branch main --commit "$GITHUB_SHA" --json conclusion --jq '.[0].conclusion')"
          test "$conclusion" = "success"

      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Set up pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.9.0 --activate

      - name: Verify version input
        run: |
          test "$(node -p "require('./package.json').version")" = "${{ inputs.version }}"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint and format check
        run: pnpm lint

      - name: Typecheck
        run: pnpm check

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Smoke test production CLI and MCP
        run: pnpm smoke

      - name: Verify generated dist is committed
        run: git diff --exit-code -- dist

      - name: Verify npm package metadata
        run: pnpm package:check

      - name: Publish
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
